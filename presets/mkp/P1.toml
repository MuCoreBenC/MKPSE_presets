custom_unmount_gcode = """
G92 E0
G1 F30000
G1 X246 Y0 ;到驻点
G1 X256 F6000 ; 收笔
G1 F30000
L802
G1 F1500
G1 E10.7;填充回抽
G1 F30000
M106 P1 S[AUTO] ; 风扇
;M106 P2 S100
G1 X70 Y265 F30000;Wipe
G1 E6;Wipe
G1 X90 F30000;Wipe
G1 X120 F30000;Wipe
G1 X90 F30000;Wipe
"""
glue_z_offset = -0.05 # 涂胶Z偏移(mm) 范围:-5~2
