#胶笔配置
[toolhead]
offset = { x = -25.9, y = 14, z = 1.1 } # 笔尖偏移
speed_limit = 70 # 涂胶速度限制 (mm/s)
MKP_retract = 0 # 回抽长度(mm)
first_pen_revitalization_flag = false # 首笔活化标志
# 自定义工具头获取 G-code
custom_mount_gcode = """
L803;此处使喷嘴降温
G92 E0;挤出机归零
G1 E-10;长回抽
G92 E0
L801
M204 S10000
G1 X20 Y7 F30000;到驻点
G1 X1 F300;推到X0，笔尖下落
G1 X20 Y7 F30000;向左离开
G1 F30000
"""
