#胶笔配置
[toolhead]
speed_limit = 70  #涂胶速度限制 (mm/s)
offset = { x = -25.9, y = 14, z = 1.1 }# 笔尖偏移
# 自定义工具头获取 G-code
custom_mount_gcode = """
;X1
L803;此处使喷嘴降温
G92 E0;挤出机归零
;M106 P1 S255 
;M106 P2 S255
G1 E-10;长回抽
G92 E0
L801
M204 S10000  ;10000mm/s2
G1 X20 Y7 F30000 ;到驻点
G1 X1 F300 ; 推到X0，笔尖下落
G1 X20 Y7 F30000 ; 向左离开
G1 F30000
"""
# 自定义工具头收起 G-code
custom_unmount_gcode = """
G92 E0
G1 F30000
G1 X246 Y0 ;到驻点
G1 X256 F6000 ; 收笔
G1 F30000
L802
G1 F1500
G1 E10.7;填充回抽
G1 F30000
M106 P1 S[AUTO] ; 风扇
;M106 P2 S100
G1 X70 Y265 F30000;Wipe
G1 E6;Wipe
G1 X90 F30000;Wipe
G1 X120 F30000;Wipe
G1 X90 F30000;Wipe
"""
minor_nozzle_flag = false # 小喷嘴标志 Minor nozzle flag
MKP_retract = -10.0 # MKP回抽距离(mm) 范围:-20~0 MKP retract distance
first_pen_revitalization_flag = false # 首笔活化标志 First pen revitalization flag
l803_leak_prevent_flag = true # L803防漏标志 L803 leak prevent flag
glue_z_offset = -0.15 # 涂胶Z偏移(mm) 范围:-2~2 Glue Z offset
prime_length = 100.0 # 预涂长度(mm) 范围:0~300 Prime length
[wiping]
have_wiping_components = true#使用擦嘴塔而非擦嘴组件Enable wiping components
wiper_x = 20
wiper_y = 20
wipetower_speed = 200.0 # 擦嘴塔打印速度Wipe tower print speed
nozzle_cooling_flag = false # 涂胶期间是否降温 Nozzle cooling during gluing
iron_apply_flag = false # 最小化涂胶区域 Ironing apply flag
user_dry_time = 0 # 额外干燥时间 User dry time (seconds)
force_thick_bridge_flag = true # 强制厚桥开关 Force thick bridge flag
support_extrusion_multiplier = 0.8 # 支撑体挤出倍率 Support extrusion multiplier
interface_ironing_flag = false  # 接口熨烫 Interface ironing flag
copy_top_layer_only = true  # 仅复制顶层支撑面(仅BambuStudio) Copy top layer support interface only
tower_extrude_ratio = 1.0 # 塔挤出比例 范围:0.1~3 Tower extrude ratio
use_disk_wipe_flag = true # 使用盘擦标志 Use disk wipe flag
fan_speed = 255.0 # 风扇速度 范围:0~255 Fan speed
part_drying_speed = 50.0 # 部件干燥速度(mm/s) 范围:0~200 Part drying speed
switch_tower_type = 2 # 切换塔类型 范围:0~3 Switch tower type
small_feature_factor = 1.0 # 小特征因子 范围:0~2 Small feature factor
first_layer_wipe_tower_collision_check = true # 首层擦嘴塔碰撞检查 First layer wipe tower collision check
sheath_mode = "off" # 鞘模式(off/auto/force) Sheath mode
sheath_base_expand = 5.0 # 鞘底扩展(mm) 范围:0~20 Sheath base expand
sheath_wall_width = 0.8 # 鞘壁宽(mm) 范围:0.2~3 Sheath wall width
sheath_enable_height = 70.0 # 鞘启用高度(mm) 范围:0~300 Sheath enable height
sheath_converge_layers = 50 # 鞘收敛层数 范围:1~200 Sheath converge layers
ironing_e_sum_threshold = 7.9 # 熨烫E总和阈值 范围:0~50 Ironing E sum threshold
ironing_mode = "off"  # 熨烫模式: off=始终移除, on=始终保留, auto=自动判断 Ironing mode
use_ironing_path = false  # 使用熨烫路径作为涂胶路径 Use ironing path as glue path
prime_trigger_layers = 30 # 预涂触发层数 范围:1~100 Prime trigger layers
disk_stagger_mode = "off" # 圆盘错开模式(off/on/auto) Disk stagger mode
disk_stagger_angle = 5.0 # 圆盘错开角度(°) 范围:0~30 Disk stagger angle
disk_stagger_max_angle = 45.0 # 圆盘最大偏移角度(°) 范围:10~90 Disk stagger max angle