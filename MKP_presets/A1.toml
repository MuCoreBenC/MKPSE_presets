# 拓竹 (Bambu Lab) A1 配置文件
# 由 AI Platform 自动生成 - 2026-06-22 16:16:12
# Machine Group: A1
# Variant: standard

[toolhead]
# 笔尖偏移
offset = { x = -1, y = 18.6, z = 3.8 }
# 涂胶速度限制 (mm/s)
speed_limit = 70
# 回抽长度(mm)
MKP_retract = 0
# 首笔活化标志
first_pen_revitalization_flag = false
# 自定义工具头获取 G-code
custom_mount_gcode = """G92 E0
G1 E-5 F1800
G92 E0
L801
M204 S10000
G1 X256 F42000
G1 X261 F10000
G1 X267 F10000
G1 X256 F42000
G1 F42000"""
# 自定义工具头收起 G-code
custom_unmount_gcode = """M106 S[AUTO]
G1 X256 F42000
G1 X261 F10000
G1 X271 F10000
G1 X256 F5000
G1 F42000
L802
G92 E0
G1 E5.5 F1000
G92 E0
G1 F30000"""
# 涂胶Z偏移(mm) 范围:-5~2
glue_z_offset = -0.05
# 预涂长度(mm) 范围:0~500
prime_length = 100

[wiping]
# 使用擦嘴塔而非擦嘴组件
have_wiping_components = "tower"
# 擦嘴塔X坐标(mm)
wiper_x = 20
# 擦嘴塔Y坐标(mm)
wiper_y = 20
# 擦嘴塔打印速度
wipetower_speed = 200
# 支撑体挤出倍率
tower_extrude_ratio = 1
# 涂胶期间是否降温
nozzle_cooling_flag = false
# 风扇速度 范围:0~255
fan_speed = 255
# 额外干燥时间
user_dry_time = 0
# 部件干燥速度(mm/s) 范围:0~200
part_drying_speed = 50
# 支撑体挤出倍率
support_extrusion_multiplier = 0.8
# 小特征因子 范围:0~2
small_feature_factor = 1
# 熨烫模式: off=始终移除, on=始终保留, auto=自动判断
ironing_mode = "off"
# 熨烫E总和阈值 范围:0~100
ironing_e_sum_threshold = 7.9
# 使用熨烫路径作为涂胶路径
use_ironing_path = false
# 熨烫覆盖率阈值(%) 范围:0~100
ironing_coverage_threshold = 10
# 熨烫抑制扩展(mm) 范围:0~20
ironing_suppress_expand = 0
# 熨烫抑制扩展模式(bbox/centroid)
ironing_suppress_expand_mode = "bbox"
# 预涂触发层数 范围:0~999
prime_trigger_layers = 30
# 圆盘错开模式(off/on/auto)
disk_stagger_mode = "off"
# 圆盘错开角度(度) 范围:0~30
disk_stagger_angle = 5
# 圆盘最大偏移角度(度) 范围:10~90
disk_stagger_max_angle = 45
# 圆盘摆动模式(spiral/oscillate)
disk_stagger_swing_mode = "spiral"
# 涂胶次数 范围:1~10
glue_pass_count = 1
# 涂胶Z抬升高度(mm) 范围:5~10
glue_z_lift_height = 5
# 前3层抬升高度(mm) 范围:6~10
glue_z_lift_height_first_layers = 6
# 模型间/段间跳转Z抬升高度(mm) 范围:2~5
glue_inter_model_lift_height = 2
# 润笔最小路径长度(mm) 范围:0~100
prime_min_path_length = 5
# 每个模型都润笔
prime_per_model = false
# 每层润笔
prime_every_layer = false
# 斜肋额外长度(mm) 范围:0~300
rib_extra_length = 0
# 斜肋宽度(mm) 范围:0~300
rib_width = 8
# 外墙倒圆角
rib_fillet_wall = true
# 关闭第三层裹头检测(A1/A1 mini)
disable_3rd_layer_clog_detect = false
# XY校准模式(default=默认,new=新型)
xy_calibration_mode = "default"
# 最小支撑涂胶面过滤
min_support_interface_enabled = true
# 涂胶稀疏比(%)
glue_sparse_ratio = 50
# 擦料塔首层流量 范围:0.5~2
tower_first_layer_flow = 1
# 擦料塔模式
fast_tower_mode = "fast"
# 涂胶面层速度
tower_glue_layer_speed = 35
# 斜肋打印速度模式
tower_rib_speed = "follow"
# 斜肋自定义打印速度
tower_rib_speed_value = 40
# 塔层高策略
tower_custom_layer_height = "auto"
# 擦嘴策略
tower_wipe_mode = "auto"
# 塔安全Z偏移(0.3~5.0mm)
tower_safe_z_offset = 0.7
# 塔刮擦速度(50~500mm/s)
tower_travel_speed = 200
# 外围结构(none/rib)
outer_structure = "rib"

